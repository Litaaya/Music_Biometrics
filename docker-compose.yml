services:
  minio:
    image: minio/minio:latest
    container_name: minio
    mem_limit: 256m
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_PASS}
    volumes:
      - minio_data:/data
    command: server /data --console-address ":9001"
    networks:
      - lakehouse_net

  catalog-db:
    image: postgres:16-alpine
    container_name: catalog-db
    mem_limit: 256m
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - catalog_db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - lakehouse_net

  minio-init:
    image: minio/mc
    container_name: minio-init
    depends_on:
      - minio
    entrypoint: >
      /bin/sh -c "
      until mc alias set local http://minio:9000 '${MINIO_USER}' '${MINIO_PASS}'; do
        echo 'Waiting for MinIO';
        sleep 2;
      done;
      mc mb -p local/warehouse;
      exit 0;
      "
    networks:
      - lakehouse_net

  iceberg-rest:
    image: tabulario/iceberg-rest:0.6.0
    container_name: iceberg-rest
    mem_limit: 384m
    ports:
      - "8181:8181"
    environment:
      JAVA_TOOL_OPTIONS: "-Xms128m -Xmx256m"
      CATALOG_CATALOG__IMPL: org.apache.iceberg.jdbc.JdbcCatalog
      CATALOG_URI: jdbc:postgresql://catalog-db:5432/${POSTGRES_DB}
      CATALOG_JDBC_USER: ${CATALOG_JDBC_USER}
      CATALOG_JDBC_PASSWORD: ${CATALOG_JDBC_PASSWORD}
      CATALOG_WAREHOUSE: s3://warehouse/
      CATALOG_IO__IMPL: org.apache.iceberg.aws.s3.S3FileIO
      AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID}
      AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY}
      AWS_REGION: us-east-1
      CATALOG_S3_ENDPOINT: http://minio:9000
      CATALOG_S3_PATH__STYLE__ACCESS: "true"
    depends_on:
      catalog-db:
        condition: service_healthy
      minio:
        condition: service_started
      minio-init:
        condition: service_completed_successfully
    networks:
      - lakehouse_net

  kafka:
    image: confluentinc/cp-kafka:7.6.0
    container_name: kafka
    mem_limit: 768m
    ports:
      - "9092:9092"
    environment:
      KAFKA_HEAP_OPTS: "-Xms200m -Xmx350m"
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: 'broker,controller'
      KAFKA_CONTROLLER_QUORUM_VOTERS: '1@kafka:29093'
      KAFKA_LISTENERS: 'PLAINTEXT://0.0.0.0:29092,CONTROLLER://0.0.0.0:29093,PLAINTEXT_HOST://0.0.0.0:9092'
      KAFKA_ADVERTISED_LISTENERS: 'PLAINTEXT://kafka:29092,PLAINTEXT_HOST://localhost:9092'
      KAFKA_INTER_BROKER_LISTENER_NAME: 'PLAINTEXT'
      KAFKA_CONTROLLER_LISTENER_NAMES: 'CONTROLLER'
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: 'CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT'
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      CLUSTER_ID: 'MkU3OEVBNTcwNTJENDM2Qk'
    volumes:
      - kafka_data:/var/lib/kafka/data
    networks:
      - lakehouse_net

  schema-registry:
    image: confluentinc/cp-schema-registry:7.6.0
    container_name: schema-registry
    mem_limit: 384m
    ports:
      - "8081:8081"
    environment:
      SCHEMA_REGISTRY_HEAP_OPTS: "-Xms128m -Xmx256m"
      SCHEMA_REGISTRY_HOST_NAME: schema-registry
      SCHEMA_REGISTRY_KAFKASTORE_BOOTSTRAP_SERVERS: 'kafka:29092'
      SCHEMA_REGISTRY_LISTENERS: http://0.0.0.0:8081
    depends_on:
      - kafka
    networks:
      - lakehouse_net

  spark-streaming-worker:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: spark-streaming-worker
    mem_limit: 768m
    command: python src/ingestion/main.py
    environment:
      - SPARK_LOCAL_THREADS=2
      - SPARK_DRIVER_MEMORY=512m
      - SPARK_EXECUTOR_MEMORY=512m
      - SPARK_DRIVER_MEMORY_OVERHEAD=128m
      - SPARK_EXECUTOR_MEMORY_OVERHEAD=128m
    env_file:
      - .env
    networks:
      - lakehouse_net
    depends_on:
      - kafka
      - schema-registry
      - iceberg-rest
      - minio
    restart: unless-stopped

  biometric-generator:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: biometric-generator
    mem_limit: 256m
    command: python src/generator/main.py
    env_file:
      - .env
    networks:
      - lakehouse_net
    depends_on:
      - kafka
      - schema-registry
      - iceberg-rest
      - minio
    restart: unless-stopped

  bootstrap-loader:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: bootstrap-loader
    command: python src/loader/main.py
    env_file:
      - .env
    networks:
      - lakehouse_net
    depends_on:
      - iceberg-rest
      - minio

  airflow:
    build:
      context: .
      dockerfile: Dockerfile.airflow
    container_name: airflow
    mem_limit: 1g
    ports:
      - "8080:8080"
    env_file:
      - .env
    environment:
      - AIRFLOW__CORE__LOAD_EXAMPLES=False
      - AIRFLOW__CORE__EXECUTOR=SequentialExecutor
      - DBT_PROFILES_DIR=/opt/airflow/dbt_project
      - AIRFLOW_ADMIN_USER=${AIRFLOW_ADMIN_USER}
      - AIRFLOW_ADMIN_PASS=${AIRFLOW_ADMIN_PASS}
      - AIRFLOW_ADMIN_EMAIL=${AIRFLOW_ADMIN_EMAIL}
    volumes:
      - ./airflow/dags:/opt/airflow/dags
      - ./airflow/logs:/opt/airflow/logs
      - ./airflow/plugins:/opt/airflow/plugins
      - .:/opt/airflow/dbt_project
    command: |
      bash -c "
      airflow db migrate &&
      (airflow users create --username \"$$AIRFLOW_ADMIN_USER\" --firstname Quan --lastname Do --role Admin --email \"$$AIRFLOW_ADMIN_EMAIL\" --password \"$$AIRFLOW_ADMIN_PASS\" || true) &&
      airflow standalone
      "
    depends_on:
      - iceberg-rest
      - minio
    networks:
      - lakehouse_net

volumes:
  minio_data:
  catalog_db_data:
  kafka_data:

networks:
  lakehouse_net:
    driver: bridge